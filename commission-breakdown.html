<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commission Breakdown | Personal Finance Calculators</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 p-4 md:p-8 text-slate-900 font-sans">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <header class="mb-8 flex flex-col md:flex-row md:items-start justify-between gap-6 relative">
      <div class="space-y-1">
        <h1 class="text-3xl font-bold tracking-tight text-slate-800">Commission Breakdown</h1>
        <p class="text-slate-500 pt-1 text-sm">Calculate your commission earnings.</p>
      </div>

      <div class="relative flex items-start">
        <button
          id="hamburger-btn"
          class="bg-white border border-slate-200 rounded-lg p-2 shadow-sm hover:bg-slate-50"
          aria-label="Open menu"
          onclick="toggleMenu()"
        >
          <i data-lucide="menu" class="w-5 h-5 text-slate-700"></i>
        </button>
        <div
          id="hamburger-menu"
          class="hidden absolute right-0 top-12 bg-white border border-slate-200 rounded-xl shadow-sm p-4 z-50 min-w-[200px]"
        >
          <a
            href="index.html"
            class="block text-slate-700 hover:text-blue-600 font-semibold py-2 px-2 rounded hover:bg-slate-50 transition-colors"
          >
            Budget Planner
          </a>
          <a
            href="student-loans.html"
            class="block text-slate-700 hover:text-blue-600 font-semibold py-2 px-2 rounded hover:bg-slate-50 transition-colors"
          >
            Student Loans Calculator
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <div class="text-center py-12">
        <i data-lucide="construction" class="w-16 h-16 mx-auto text-slate-300 mb-4"></i>
        <h2 class="text-2xl font-bold text-slate-700 mb-2">Coming Soon</h2>
        <p class="text-slate-500">The Commission Breakdown calculator is currently under development.</p>
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("hamburger-menu");
      if (!menu) return;
      menu.classList.toggle("hidden");
    }

    lucide.createIcons();
  </script>
</body>
</html>
